name: Build Pack3D APK

on:
  push:
    branches: [main]
  workflow_dispatch: # 允许手动触发构建

jobs:
  build:
    runs-on: ubuntu-24.04 # 使用 Ubuntu 24.04

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 安装系统构建依赖
        run: |
          echo "📦 开始安装系统构建依赖..."
          
          # 更新软件源
          sudo apt-get update -y
          
          # 安装核心构建工具
          sudo apt-get install -y \
              build-essential \
              cmake \
              libffi-dev \
              libssl-dev \
              autoconf \
              automake \
              libtool \
              pkg-config \
              git \
              unzip \
              wget \
              zip \
              zlib1g-dev \
              openjdk-11-jdk-headless \
              libltdl-dev \
              libncurses-dev \
              libgdbm-dev \
              libnss3-dev \
              libsqlite3-dev \
              libreadline-dev \
              libbz2-dev \
              libxml2-dev \
              libxslt1-dev \
              libjpeg-dev \
              libpng-dev \
              libsqlite3-0
          
          echo "✅ 系统依赖安装完成"

      - name: 🔧 设置完整的 Android 构建环境
        run: |
          echo "设置 Android 构建环境..."
          SDK_ROOT="/home/runner/.buildozer/android/platform/android-sdk"
          
          # 1. 安装命令行工具
          mkdir -p "$SDK_ROOT"
          CD_TOOLS_ZIP="commandlinetools-linux-11076708_latest.zip"
          CD_TOOLS_URL="https://dl.google.com/android/repository/${CD_TOOLS_ZIP}"
          echo "下载命令行工具..."
          wget -q "$CD_TOOLS_URL" -O "/tmp/${CD_TOOLS_ZIP}"
          
          echo "解压到: $SDK_ROOT/cmdline-tools/latest/"
          unzip -q "/tmp/${CD_TOOLS_ZIP}" -d "/tmp/"
          mkdir -p "$SDK_ROOT/cmdline-tools"
          mv "/tmp/cmdline-tools" "$SDK_ROOT/cmdline-tools/latest"
          
          # 2. 将SDK工具路径设置为持久化环境变量
          echo "ANDROID_SDK_ROOT=$SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_HOME=$SDK_ROOT" >> $GITHUB_ENV
          echo "$SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          
          # 3. 安装构建所需的SDK组件 (根据您的 buildozer.spec 配置)
          echo "安装必需的 Android SDK 组件..."
          # 先确保sdkmanager在当前步骤内可用
          export ANDROID_SDK_ROOT="$SDK_ROOT"
          export PATH="$SDK_ROOT/cmdline-tools/latest/bin:$PATH"
          
          # 接受所有SDK许可证 (非交互模式)
          yes | sdkmanager --licenses > /dev/null 2>&1 || echo "许可证处理完成"
          
          # 根据 buildozer.spec 配置安装对应版本
          # android.api = 33, android.build_tools = 34.0.0
          echo "安装 Android SDK Platform 33..."
          sdkmanager "platforms;android-33"
          
          echo "安装 Android Build Tools 34.0.0..."
          sdkmanager "build-tools;34.0.0"
          
          echo "安装其他必需工具..."
          sdkmanager "platform-tools" "patcher;v4" "cmdline-tools;latest"
          
          echo "✅ Android SDK 环境设置完成。"
          echo "已安装的组件:"
          sdkmanager --list_installed | grep -E "platform|build-tools"

      - name: 安装 Python 构建工具
        run: |
          echo "🐍 安装 Python 构建工具..."
          
          # 升级 pip 和安装必要工具
          python -m pip install --upgrade pip
          pip install --upgrade setuptools wheel cython==0.29.33 virtualenv
          
          # 安装指定版本的 Buildozer
          pip install "buildozer<1.6.0"
          
          # 安装 Kivy 相关依赖
          pip install kivy kivymd
          
          echo "✅ Python 工具安装完成"

      - name: 配置 Buildozer
        run: |
          echo "⚙️ 配置 Buildozer 环境..."
          
          # 初始化 Buildozer
          buildozer init || true
          
          # 备份原有的 spec 文件
          if [ -f "buildozer.spec" ]; then
            cp buildozer.spec buildozer.spec.backup
            echo "已备份原始 buildozer.spec 文件"
          fi
          
          # 确保 hooks.py 和 m4_allow_all.ac 存在
          if [ ! -f "hooks.py" ]; then
            echo "创建默认 hooks.py..."
            cat > hooks.py << 'EOF'
          from pythonforandroid.toolchain import logger
          
          def pre_build(dist, *args, **kwargs):
              logger.info("开始构建 Pack3D APK...")
              logger.info(f"目标架构: {dist.archs}")
          
          def post_build(dist, *args, **kwargs):
              logger.info("Pack3D APK 构建完成！")
          EOF
          fi
          
          if [ ! -f "m4_allow_all.ac" ]; then
            echo "创建 m4_allow_all.ac..."
            cat > m4_allow_all.ac << 'EOF'
          # 允许所有宏通过 autoconf 检查
          m4_pattern_allow([^.*$])
          EOF
          fi
          
          echo "✅ Buildozer 配置完成"

      - name: 清理旧的构建缓存
        run: |
          echo "🧹 清理旧的构建缓存..."
          rm -rf .buildozer/android/platform/build-* 2>/dev/null || true
          rm -rf .buildozer/android/app 2>/dev/null || true
          rm -rf bin/ 2>/dev/null || true
          mkdir -p bin
          mkdir -p .buildozer
          echo "✅ 缓存清理完成"

      - name: 构建 APK
        env:
          # 设置 Buildozer 环境变量
          BUILD_NAME: "Pack3D"
          P4A_RELEASE_KEYSTORE_PASSWD: ${{ secrets.KEYSTORE_PASSWORD }}
          P4A_RELEASE_KEYALIAS_PASSWD: ${{ secrets.KEY_ALIAS_PASSWORD }}
        run: |
          echo "🚀 开始构建 Pack3D APK..."
          cd $GITHUB_WORKSPACE
          
          # 环境变量 ANDROID_SDK_ROOT 和 PATH 已由前面步骤设置
          echo "当前 ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"
          echo "当前 PATH 包含的sdkmanager路径:"
          echo "$PATH" | tr ':' '\n' | grep sdk
          
          # 显示 Buildozer 配置摘要
          echo "=== Buildozer 配置摘要 ==="
          grep -E "^(title|package\.|version|requirements|android\.)" buildozer.spec | head -20
          
          echo "开始时间: $(date)"
          echo "提示：首次构建需下载 NDK 和其他依赖，约需20-40分钟，请耐心等待..."
          
          # 执行构建 (启用详细日志)
          timeout 3600 buildozer -v android debug 2>&1 | tee build_output.log
          
          BUILD_EXIT_CODE=${PIPESTATUS[0]}
          echo "构建结束时间: $(date)"
          echo "构建退出代码: $BUILD_EXIT_CODE"
          
          # 处理构建结果
          if [ $BUILD_EXIT_CODE -eq 0 ]; then
            echo "🎉 Buildozer 构建成功！"
            
            # 查找 APK 文件
            APK_FILES=$(find . -name "*.apk" -type f 2>/dev/null || true)
            
            if [ -n "$APK_FILES" ]; then
              echo "✅ 找到 APK 文件:"
              echo "$APK_FILES" | while read apk; do
                apk_name=$(basename "$apk")
                apk_size=$(du -h "$apk" | cut -f1)
                echo "  - $apk_name ($apk_size)"
                # 确保复制到 bin 目录
                mkdir -p bin
                cp "$apk" bin/
              done
              echo "📱 最终 bin/ 目录内容:"
              ls -lh bin/
            else
              echo "⚠️  构建成功但未找到 .apk 文件"
              echo "正在全项目搜索..."
              find . -name "*.apk" -type f 2>/dev/null
              exit 1
            fi
            
          elif [ $BUILD_EXIT_CODE -eq 124 ]; then
            echo "⏰ 构建超时（60分钟）"
            echo "可能原因:"
            echo "  1. 网络缓慢，依赖下载超时"
            echo "  2. 首次构建下载量过大（NDK约1GB）"
            echo "建议:"
            echo "  1. 检查工作流日志中的下载进度"
            echo "  2. 可适当增加超时时间或使用更快的镜像源"
            exit 1
          else
            echo "❌ Buildozer 构建失败"
            echo "=== 最后 100 行错误日志 ==="
            tail -100 build_output.log
            echo "=== 关键错误搜索 ==="
            grep -n -i -B2 -A2 "error\|fail\|exception\|404\|not found\|ERROR\|FAILED" build_output.log | head -50 || echo "未找到关键字"
            
            # 检查常见的具体错误
            if grep -q "Could not find a version that satisfies the requirement" build_output.log; then
              echo "⚠️ 检测到依赖包版本问题，请检查 requirements 配置"
            fi
            
            if grep -q "NDK version" build_output.log; then
              echo "⚠️ 检测到 NDK 版本问题，请检查 android.ndk 配置"
            fi
            
            exit 1
          fi
          
          echo "✅ 构建步骤完成"

      - name: 上传生成的 APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: pack3d-apk
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 7

      - name: 上传构建日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build_output.log
            .buildozer/*.log
          if-no-files-found: warn
          retention-days: 7

      - name: 构建状态汇总
        if: always()
        run: |
          echo "=== 构建状态汇总 ==="
          echo "作业状态: ${{ job.status }}"
          echo "构建时间: $(date)"
          echo "工作流: ${{ github.workflow }}"
          echo "运行 ID: ${{ github.run_id }}"
          
          if [ -f "build_output.log" ]; then
            BUILD_RESULT=$(tail -5 build_output.log | grep -o "Buildozer.*" || echo "未知")
            echo "构建结果: $BUILD_RESULT"
            echo "构建日志大小: $(wc -l < build_output.log) 行"
            
            # 检查是否有APK生成
            if find bin/ -name "*.apk" 2>/dev/null | grep -q .; then
              APK_COUNT=$(find bin/ -name "*.apk" | wc -l)
              APK_SIZE=$(du -ch bin/*.apk 2>/dev/null | tail -1 | cut -f1)
              echo "生成APK数量: $APK_COUNT 个"
              echo "APK总大小: $APK_SIZE"
            else
              echo "警告: 未生成APK文件"
            fi
          fi
