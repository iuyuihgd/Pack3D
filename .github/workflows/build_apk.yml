name: Build Pack3D APK

on:
  push:
    branches: [main]
  workflow_dispatch:  # 允许手动触发构建

jobs:
  build:
    runs-on: ubuntu-24.04  # 使用 Ubuntu 24.04
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 创建构建补丁文件
        run: |
          # 创建解决 autoconf 宏检查错误的补丁文件
          cat > m4_allow_all.ac << 'EOF'
          # 允许所有宏通过 autoconf 检查
          m4_pattern_allow([^.*$])
          EOF
          
          # 创建构建钩子文件
          cat > hooks.py << 'EOF'
          from pythonforandroid.toolchain import logger
          
          def pre_build(dist, *args, **kwargs):
              logger.info("开始构建 Pack3D APK...")
              logger.info(f"目标架构: {dist.archs}")
          
          def post_build(dist, *args, **kwargs):
              logger.info("Pack3D APK 构建完成！")
          EOF
          
          echo "✅ 补丁文件创建完成"

      - name: 安装系统构建依赖
        run: |
          echo "📦 开始安装系统构建依赖..."
          
          # 更新软件源
          sudo apt-get update -y
          
          # 安装核心构建工具
          sudo apt-get install -y \
              build-essential \
              cmake \
              libffi-dev \
              libssl-dev \
              autoconf \
              automake \
              libtool \
              pkg-config \
              git \
              unzip \
              wget \
              zip \
              zlib1g-dev \
              openjdk-11-jdk-headless \
              libltdl-dev \
              libncurses-dev \
              libgdbm-dev \
              libnss3-dev \
              libsqlite3-dev \
              libreadline-dev \
              libbz2-dev \
              libxml2-dev \
              libxslt1-dev \
              libjpeg-dev \
              libpng-dev
          
          echo "✅ 系统依赖安装完成"

      - name: 🔧 手动安装 Android SDK 命令行工具 (CLI Tools)
        run: |
          echo "正在手动安装 Android SDK 命令行工具..."
          
          # 1. 设置Android SDK路径变量
          SDK_ROOT="/home/runner/.buildozer/android/platform/android-sdk"
          mkdir -p "$SDK_ROOT"
          
          # 2. 下载最新的命令行工具包 (commandlinetools) - 关键修复：使用完整URL
          CD_TOOLS_ZIP="commandlinetools-linux-11076708_latest.zip"
          CD_TOOLS_URL="https://dl.google.com/android/repository/${CD_TOOLS_ZIP}"
          echo "下载命令行工具包: $CD_TOOLS_URL"
          
          wget -q "$CD_TOOLS_URL" -O "/tmp/${CD_TOOLS_ZIP}"
          
          # 3. 解压并放置到新版SDK要求的特定路径 (关键修复：符合新目录规范)
          unzip -q "/tmp/${CD_TOOLS_ZIP}" -d "/tmp/"
          
          # 创建目标目录并移动工具到 cmdline-tools/latest/
          mkdir -p "$SDK_ROOT/cmdline-tools"
          mv "/tmp/cmdline-tools" "$SDK_ROOT/cmdline-tools/latest"
          
          # 4. 预接受所有许可证 (关键！)
          mkdir -p "$SDK_ROOT/licenses"
          echo -e "8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > "$SDK_ROOT/licenses/android-sdk-license"
          echo "84831b9409646a918e30573bab4c9c91346d8abd" > "$SDK_ROOT/licenses/android-sdk-preview-license"
          
          # 5. 验证安装
          echo "Android SDK工具安装完成，验证sdkmanager..."
          export ANDROID_SDK_ROOT="$SDK_ROOT"
          export PATH="$SDK_ROOT/cmdline-tools/latest/bin:$PATH"
          
          # 检查sdkmanager是否存在
          if [ -f "$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" ]; then
            echo "✅ sdkmanager 已正确安装于标准路径"
            # 快速验证sdkmanager可运行
            "$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --list 2>&1 | head -5
          else
            echo "❌ sdkmanager 未在预期路径找到。检查目录结构："
            ls -la "$SDK_ROOT/" && ls -la "$SDK_ROOT/cmdline-tools/" 2>/dev/null
            exit 1
          fi

      - name: 安装 Python 构建工具
        run: |
          echo "🐍 安装 Python 构建工具..."
          
          # 升级 pip 和安装必要工具
          python -m pip install --upgrade pip
          pip install --upgrade setuptools wheel cython==0.29.33 virtualenv
          
          # 安装指定版本的 Buildozer
          pip install "buildozer<1.6.0"
          
          echo "✅ Python 工具安装完成"

      - name: 清理旧的构建缓存
        run: |
          echo "🧹 清理旧的构建缓存..."
          rm -rf .buildozer/android/platform/build-* 2>/dev/null || true
          rm -rf .buildozer/android/app 2>/dev/null || true
          rm -rf bin/ 2>/dev/null || true
          mkdir -p bin
          mkdir -p .buildozer
          echo "✅ 缓存清理完成"

      - name: 构建 APK
        run: |
          echo "🚀 开始构建 Pack3D APK..."
          cd $GITHUB_WORKSPACE
          
          # 设置环境变量 (使用新版SDK工具路径)
          export ANDROID_SDK_ROOT="/home/runner/.buildozer/android/platform/android-sdk"
          export PATH="${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin:${PATH}"
          
          # 执行构建（关键：添加 --accept-license 参数自动接受许可证）
          echo "开始时间: $(date)"
          echo "提示：首次构建需下载大量依赖（SDK、NDK等），约需20-40分钟，请耐心等待..."
          
          # 设置 45 分钟超时，并传递自动接受许可证的参数
          timeout 2700 buildozer -v android debug -- --accept-license 2>&1 | tee build_output.log
          
          BUILD_EXIT_CODE=${PIPESTATUS[0]}
          echo "构建结束时间: $(date)"
          echo "构建退出代码: $BUILD_EXIT_CODE"
          
          # 处理构建结果
          if [ $BUILD_EXIT_CODE -eq 0 ]; then
            echo "🎉 Buildozer 构建成功！"
            
            # 查找 APK 文件
            APK_FILES=$(find . -name "*.apk" -type f 2>/dev/null || true)
            
            if [ -n "$APK_FILES" ]; then
              echo "✅ 找到 APK 文件:"
              echo "$APK_FILES" | while read apk; do
                echo "  - $apk ($(du -h "$apk" | cut -f1))"
                # 确保复制到 bin 目录
                mkdir -p bin
                cp "$apk" bin/
              done
              echo "📱 最终 bin/ 目录内容:"
              ls -lh bin/
            else
              echo "⚠️  构建成功但未找到 .apk 文件"
              echo "正在全项目搜索..."
              find . -name "*.apk" -type f 2>/dev/null
            fi
            
          elif [ $BUILD_EXIT_CODE -eq 124 ]; then
            echo "⏰ 构建超时（45分钟）"
            echo "可能原因:"
            echo "  1. 网络缓慢，依赖下载超时"
            echo "  2. 首次构建下载量过大"
            echo "建议:"
            echo "  1. 检查工作流日志中的下载进度"
            echo "  2. 可适当增加超时时间"
            exit 1
          else
            echo "❌ Buildozer 构建失败"
            echo "=== 最后 50 行错误日志 ==="
            tail -50 build_output.log
            echo "=== 关键错误搜索 ==="
            grep -n -i "error\|fail\|exception\|404\|not found" build_output.log | head -20 || echo "未找到关键字"
            exit 1
          fi
          
          echo "✅ 构建步骤完成"

      - name: 上传生成的 APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: pack3d-apk
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 7

      - name: 上传构建日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build_output.log
            .buildozer/*.log
          if-no-files-found: warn
          retention-days: 7

      - name: 构建状态汇总
        if: always()
        run: |
          echo "=== 构建状态汇总 ==="
          echo "作业状态: ${{ job.status }}"
          echo "构建时间: $(date)"
          echo "工作流: ${{ github.workflow }}"
          echo "运行 ID: ${{ github.run_id }}"
          
          if [ -f "build_output.log" ]; then
            echo "构建日志行数: $(wc -l < build_output.log)"
            echo "最后关键阶段:"
            grep -i "building \|compiling \|creating \|success\|error" build_output.log | tail -10 || echo "无法获取构建阶段"
          fi
