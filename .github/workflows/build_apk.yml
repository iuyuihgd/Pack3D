      - name: 构建 APK（完整修复版）
        run: |
          echo "🚀 开始构建 Pack3D APK..."
          cd $GITHUB_WORKSPACE
          
          # 1. 设置 Android SDK 路径
          export ANDROID_SDK_ROOT="/home/runner/.buildozer/android/platform/android-sdk"
          export PATH="${ANDROID_SDK_ROOT}/tools/bin:${ANDROID_SDK_ROOT}/build-tools/34.0.0:${PATH}"
          
          # 2. 确保 Android SDK 目录存在
          mkdir -p ${ANDROID_SDK_ROOT}
          
          # 3. 预接受所有 Android 许可证（关键修复）
          echo "📝 预接受 Android SDK 许可证..."
          mkdir -p ${ANDROID_SDK_ROOT}/licenses
          echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > ${ANDROID_SDK_ROOT}/licenses/android-sdk-license
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" > ${ANDROID_SDK_ROOT}/licenses/android-sdk-license
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > ${ANDROID_SDK_ROOT}/licenses/android-sdk-license
          echo "84831b9409646a918e30573bab4c9c91346d8abd" > ${ANDROID_SDK_ROOT}/licenses/android-sdk-preview-license
          
          # 4. 手动安装 Android 构建工具
          echo "🔧 安装 Android 构建工具..."
          if [ -f "${ANDROID_SDK_ROOT}/tools/bin/sdkmanager" ]; then
            yes | ${ANDROID_SDK_ROOT}/tools/bin/sdkmanager --licenses
            ${ANDROID_SDK_ROOT}/tools/bin/sdkmanager "platform-tools" "build-tools;34.0.0" "platforms;android-33"
          else
            echo "⚠️  sdkmanager 不存在，Buildozer 将自动安装"
          fi
          
          # 5. 执行构建
          echo "🛠️ 开始 Buildozer 构建..."
          timeout 2700 buildozer -v android debug 2>&1 | tee build_output.log
          
          # 6. 检查结果
          if [ $? -eq 0 ]; then
            echo "✅ 构建完成"
            if ls bin/*.apk 1>/dev/null 2>&1; then
              echo "🎉 APK 生成成功！"
              ls -lh bin/*.apk
            fi
          else
            echo "❌ 构建失败"
            exit 1
          fi
