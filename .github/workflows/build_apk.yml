name: Build Pack3D APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libffi-dev libssl-dev
          pip install buildozer Cython==0.29.33

      - name: Build with Buildozer (自动处理许可证和aidl)
        run: |
          cd $GITHUB_WORKSPACE
          # 用 buildozer 自己的方式自动接受许可证，避免 sdkmanager 不存在
          echo "yes" | buildozer -v android debug accept-eula
