name: Build Pack3D APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 创建补丁文件 (解决 autoconf 错误)
        run: |
          # 创建 m4_allow_all.ac 文件来解决 autoconf 的宏检查错误
          cat > m4_allow_all.ac << 'EOF'
          # 允许所有宏通过 autoconf 检查
          m4_pattern_allow([^.*$])
          EOF
          
          # 创建 hooks.py 文件用于构建钩子 (可选，用于调试)
          cat > hooks.py << 'EOF'
          from pythonforandroid.toolchain import logger
          
          def pre_build(dist, *args, **kwargs):
              logger.info("开始构建 Pack3D APK...")
              logger.info("当前架构: " + str(dist.archs))
          
          def post_build(dist, *args, **kwargs):
              logger.info("Pack3D APK 构建完成！")
              logger.info("输出目录: " + dist.dist_dir)
          EOF
          
          echo "✅ 补丁文件已创建"
          ls -la m4_allow_all.ac hooks.py

      - name: 安装系统构建依赖
        run: |
          echo "📦 安装系统依赖..."
          sudo apt-get update
          sudo apt-get install -y \
              build-essential \
              cmake \
              libffi-dev \
              libssl-dev \
              autoconf \        # 解决 autoconf 错误的必需工具
              automake \
              libtool \
              pkg-config \
              git \
              unzip \
              wget \
              zip \
              zlib1g-dev \
              openjdk-11-jdk \  # Android 构建需要的 Java
              libltdl-dev
          
          echo "✅ 系统依赖安装完成"

      - name: 安装 Python 构建工具
        run: |
          echo "🐍 安装 Python 工具..."
          python -m pip install --upgrade pip
          pip install --upgrade setuptools wheel cython==0.29.33
          pip install "buildozer<1.6.0"  # 使用兼容版本
          
          echo "✅ Python 工具安装完成"

      - name: 清理旧的构建缓存
        run: |
          echo "🧹 清理构建缓存..."
          # 清理本地构建缓存
          rm -rf .buildozer/android/platform/build-* 2>/dev/null || true
          rm -rf .buildozer/android/app 2>/dev/null || true
          
          echo "✅ 缓存清理完成"

      - name: 构建 APK (关键修复步骤)
        run: |
          echo "🚀 开始构建 Pack3D APK..."
          cd $GITHUB_WORKSPACE
          
          # 1. 环境检查
          echo "=== 环境检查 ==="
          echo "工作目录: $(pwd)"
          echo "Buildozer 版本:"
          buildozer --version || echo "Buildozer 不可用"
          echo ""
          
          # 2. 验证配置文件
          echo "=== 配置文件验证 ==="
          if [ ! -f "buildozer.spec" ]; then
            echo "❌ 错误: 找不到 buildozer.spec 文件"
            exit 1
          fi
          echo "✅ buildozer.spec 存在"
          echo ""
          
          # 3. 执行构建 (关键修复：添加 --accept-license 参数)
          echo "=== 开始执行构建 ==="
          echo "开始时间: $(date)"
          
          # 关键修改：使用 --accept-license 自动接受 Android SDK 许可证
          # 这解决了日志中“Accept? (y/N):”交互阻塞的问题
          yes | buildozer -v android debug -- --accept-license 2>&1 | tee build_output.log
          BUILD_STATUS=${PIPESTATUS[0]}
          
          echo "结束时间: $(date)"
          echo "构建退出状态: $BUILD_STATUS"
          echo ""
          
          # 4. 检查构建结果
          echo "=== 构建结果检查 ==="
          
          if [ $BUILD_STATUS -eq 0 ]; then
            echo "✅ Buildozer 命令执行成功"
            
            # 检查是否生成了 APK
            if ls bin/*.apk 1>/dev/null 2>&1; then
              APK_FILE=$(ls bin/*.apk | head -1)
              echo "🎉 APK 构建成功！"
              echo "文件: $APK_FILE"
              echo "大小: $(du -h "$APK_FILE" | cut -f1)"
              ls -lh bin/*.apk
            else
              echo "⚠️ 构建成功但没有在 bin/ 目录中找到 APK 文件"
              echo "检查其他可能位置:"
              find . -name "*.apk" -type f 2>/dev/null || echo "没有找到任何 .apk 文件"
            fi
          else
            echo "❌ Buildozer 构建失败，退出码: $BUILD_STATUS"
            echo ""
            echo "=== 错误摘要（最后30行）==="
            tail -30 build_output.log
            echo ""
            exit 1
          fi

      - name: 上传生成的 APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: pack3d-apk
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 7
          
      - name: 上传构建日志 (用于调试)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build_output.log
            .buildozer/*.log
          if-no-files-found: warn
          retention-days: 7
