name: Build Pack3D APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install only core build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libffi-dev libssl-dev
          pip install buildozer Cython==0.29.33

      - name: Build with Buildozer (let it handle ALL SDK/NDK/licenses/aidl)
        run: |
          cd $GITHUB_WORKSPACE
          # 让 Buildozer 自动处理一切，不干预任何 SDK 相关操作
          buildozer -v android debug
