name: Build Pack3D APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装核心依赖 + 系统级 aidl
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libffi-dev libssl-dev android-sdk-build-tools
          pip install buildozer Cython==0.29.33

      - name: 执行 Buildozer（自动接受许可证 + 处理 aidl）
        run: |
          cd $GITHUB_WORKSPACE
          # --accept-eula 让 Buildozer 自动接受所有 SDK 许可证
          echo "yes" | buildozer -v android debug --accept-eula
